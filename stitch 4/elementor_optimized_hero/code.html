<button class="text-[#433429] dark:text-[#F9F7F5] transition-colors hover:bg-[#F9F7F5] dark:hover:bg-stone-800 p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-['Newsreader'] tracking-tight text-xl font-bold text-[#433429] dark:text-[#F9F7F5] uppercase tracking-widest">Zephirin's Bakery</h1>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container border border-outline/10">
<img alt="User profile" data-alt="close-up portrait of a person with warm skin tones against a neutral soft-lit background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrFwfcfgk2BH9bpuOmIL8-5LKQZ6Zf7GT1nicJAV2IRpgQoe44bqQwPaPf9sCi5Bt4zlc4h0DzSAOX_xxZ-wqIdBu8gpSKQLEQC0RJVFsCk2mX164HscLOcpLFud3GiOZP3nNxCea8qSmJgTXaVflaVpaqVL1SFZ8eCu7VrHSDpUkFuKX1YG6V5yOZTdqMHhvqjW0xfKCgYA8PiTJ1uz9ikUip5_LOUxQjUiBHQBQTr6QvkjZKCiDZvC3xlJ8amrHbB8dSMTkTEyg"/>

<h2 class="font-display-lg text-display-lg text-[#8C7E74]/20 uppercase tracking-[0.2em] select-none scale-150">
                    THE HEARTH
                </h2>
</div>
<!-- Foreground Element -->
<div class="floating-bread mt-xl mb-lg">
<img alt="Artisan Bajan Salt Bread" class="w-72 h-auto object-contain mask-image-radial" data-alt="isolated close-up of a crusty artisan bajan salt bread loaf with dusted flour on top, soft warm lighting, high detail texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCe2dHZEslrEh6ag7i1j1sVQVhGc2JVSnbxsCSNzhiXO08TIw8WmKHE1eyDGw6F4iZkOR-26RnH9StjUZ8bFefOdevXPL8_rcAercPdsmlwNUufXItXRHb0a81tpw9duzaA8rJin0jpTUv-0ThriYf15zFVwjuMUgHM9-VJ83CupoPeupEN40uync7L5GtX1uRxT87vaYdIJtf_tue5nXgHBLx0jdJUXNzlfHTEwoXUk5yyZUKARDvMTqKpjhUwfh7Bzk4SB79eyYE"/>

<div class="mt-lg flex flex-col gap-md w-full px-lg">

<button class="w-full bg-[#E67E22] text-white py-4 px-xl rounded-lg font-label-sm text-label-sm uppercase tracking-widest shadow-sm active:scale-95 transition-all duration-200 border border-[#D35400]">
                        Experience the Heritage

<button class="w-full bg-transparent border border-outline/20 text-[#433429] py-4 px-xl rounded-lg font-label-sm text-label-sm uppercase tracking-widest hover:bg-surface-container transition-colors">

</div>
</div>
</section>
<!-- Subtle Heritage Accent -->
<div class="w-full flex justify-center py-xl">
<div class="w-24 h-[1px] bg-[#8C7E74]/30"></div>
</div>

<div class="col-span-2 bg-surface-container-low rounded-xl p-md border border-outline/5">

<div>
